# System Configuration for Integrated AI Robot

# ============================================================================
# API Configuration
# ============================================================================

# Groq API Settings
GROQ_API_ENDPOINT="https://api.groq.com/openai/v1/chat/completions"
GROQ_MODEL_PLANNING="llama-3.1-70b-versatile"  # For planning stage
GROQ_MODEL_INTEGRATION="llama-3.1-70b-versatile"  # For integration stage

# Model selection
# "llama-3.1-70b-versatile" - Best for complex reasoning
# "llama-3.1-8b-instant" - Faster, lower cost
# "mixtral-8x7b-32768" - Good balance
# "qwen-2.5-32b" - Good for Japanese

# ============================================================================
# Vision Configuration
# ============================================================================

# YOLO Settings
YOLO_MODEL_PATH="func/camera/YOLO26n-seg.pt"
YOLO_INFERENCE_SIZE=320  # Input image size
YOLO_CONFIDENCE_THRESHOLD=0.5  # Detection confidence threshold
YOLO_IOU_THRESHOLD=0.45  # IOU threshold for NMS

# Camera Settings
CAMERA_ID=0  # Primary camera device ID
CAMERA_FPS=30
CAMERA_RESOLUTION_WIDTH=1280
CAMERA_RESOLUTION_HEIGHT=720

# ============================================================================
# Motor Configuration
# ============================================================================

# Stepper Motor Settings
MOTOR_STEP_SEQUENCE="1-2phase"  # 1-2 phase exciting for 28BYJ-48
MOTOR_STEPS_PER_ROTATION=512
MOTOR_ORIGIN_STEP=256  # 0 degree reference position
MOTOR_MIN_ANGLE=-90  # Minimum allowed angle
MOTOR_MAX_ANGLE=90   # Maximum allowed angle
MOTOR_SPEED=300  # Default motor speed

# Motor Axes (GPIO pins)
# MOTOR_A_PINS: [6, 13, 19, 26]
# MOTOR_B_PINS: [12, 16, 20, 21]
# MOTOR_C_PINS: [5, 10, 9, 11]
# MOTOR_D_PINS: [1, 2, 3, 4]

# ============================================================================
# Audio Configuration
# ============================================================================

# Speech Recognition
SPEECH_RECOGNITION_ENGINE="groq-whisper"  # Options: groq-whisper, local-stt
SPEECH_LANGUAGE="ja"
SPEECH_TIMEOUT=10000  # milliseconds

# Text-to-Speech
TTS_ENGINE="edge-tts"  # Options: edge-tts, gcloud, local
TTS_VOICE="ja-JP-NanaNeutral"  # Japanese voice
TTS_SPEED=1.0
TTS_VOLUME=0.8

# ============================================================================
# Pipeline Configuration
# ============================================================================

# Sensing Stage
SENSING_WAKEWORD="ねえロボット"
SENSING_TIMEOUT=30  # seconds

# Planning Stage
PLANNING_TEMPERATURE=0.5
PLANNING_MAX_TOKENS=500
PLANNING_TOOLS=["YOLO", "COLOR_TRACK", "MOTION_ONLY", "CONVERSATION"]

# Action Stage
ACTION_PARALLEL_EXECUTION=true
ACTION_TIMEOUT=10  # seconds

# Integration Stage
INTEGRATION_TEMPERATURE=0.7
INTEGRATION_MAX_TOKENS=1000

# Execution Stage
EXECUTION_PARALLEL_SPEECH_MOTOR=true
EXECUTION_SPEECH_TIMEOUT=30
EXECUTION_MOTOR_TIMEOUT=20

# ============================================================================
# System Behavior
# ============================================================================

# Continuous Operation
CONTINUOUS_MODE=false  # true for continuous, false for single run
LOOP_INTERVAL=1.0  # seconds between iterations

# Debug Settings
DEBUG_MODE=false
LOG_LEVEL="INFO"  # DEBUG, INFO, WARNING, ERROR
LOG_FILE="/tmp/robot_system.log"

# Error Handling
RETRY_ON_ERROR=true
MAX_RETRIES=3
RETRY_DELAY=1  # seconds

# Performance
ASYNC_OPERATIONS=true
THREAD_POOL_SIZE=4
CACHE_MODEL_IN_MEMORY=true

# ============================================================================
# Tools Configuration
# ============================================================================

# YOLO Detection
TOOLS_YOLO_ENABLED=true
TOOLS_YOLO_CONFIDENCE=0.5

# Color Tracking
TOOLS_COLOR_TRACK_ENABLED=true
TOOLS_COLOR_TRACK_HSV_LOWER=[0, 100, 100]
TOOLS_COLOR_TRACK_HSV_UPPER=[10, 255, 255]

# Conversation
TOOLS_CONVERSATION_ENABLED=true
TOOLS_CONVERSATION_CONTEXT_LENGTH=5

# ============================================================================
# Prompts
# ============================================================================

# These are template prompts - override in code if needed
PLANNING_PROMPT_TEMPLATE="""
あなたはロボットの意思決定AIです。ユーザーの質問に対して、以下のツールから最も適切なものを選択してください。
...
"""

INTEGRATION_PROMPT_TEMPLATE="""
あなたはロボットの統合制御AIです。観測結果に基づいて、適切な応答とモーターコマンドを生成してください。
...
"""
